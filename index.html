<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Plan d’action</title>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
/* --- Styles généraux --- */
* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  margin: 0;
  background: #A3B18A;
  color: #222;
}

.bloc-action {
  width: 90%;
  max-width: 900px;
  margin: 40px auto;
  padding: 25px;
  background: #B5654A;
  border-radius: 10px;
}

/* --- Header --- */
.header {
  text-align: center;
  padding: 20px;
  background: #B5654A;
  color: #f9fafb;
}

.header h1 {
  margin: 0 0 5px;
  font-size: 32px; /* PC */
}

.header p {
  margin: 0;
  font-size: 16px; /* PC */
  opacity: 0.8;
}

.header-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.header-buttons button {
  padding: 10px 16px;
  border-radius: 6px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 18px; /* PC */
  cursor: pointer;
}

/* --- Zone d'ajout --- */
.add {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.add input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}

.add button {
  padding: 10px 16px;
  border-radius: 6px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 18px; /* PC */
  cursor: pointer;
}

/* --- Colonnes --- */
.board {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.column {
  flex: 1;
  min-width: 260px;
  background: #e5e7eb;
  padding: 12px;
  border-radius: 10px;
}

.column h2 {
  margin: 0 0 10px;
  font-size: 22px; /* PC */
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.tasks {
  min-height: 40px;
}

/* --- Tâches --- */
.task {
  background: white;
  padding: 8px 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  border-left: 4px solid #9ca3af;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.task small {
  font-size: 11px;
  color: #6b7280;
  margin-left: 8px;
}

.task.todo { border-left-color: #f97316; }
.task.doing { border-left-color: #2563eb; }
.task.done { border-left-color: #16a34a; opacity: 0.85; }

/* --- Astuce --- */
.hint {
  font-size: 16px; /* PC */
  color: #f9fafb;
  margin-top: 10px;
}

/* --- Responsive smartphone --- */
@media (max-width: 600px) {

  .header h1 { font-size: 42px; }
  .header p { font-size: 20px; }

  .header-buttons button {
    font-size: 26px;
    padding: 12px 18px;
  }

  .add input { font-size: 18px; }
  .add button { font-size: 28px; }

  .column h2 { font-size: 28px; }

  .hint { font-size: 20px; }

  .board { flex-direction: column; }
}
  </style>
</head>

<body>
<div class="bloc-action">

  <header class="header">
    <h1>Plan d’action</h1>
    <p>Cliquer sur une étape pour la faire passer de “À faire” → “En cours” → “Terminé” → “À faire”.</p>

    <div class="header-buttons">
      <button id="reset-data">Réinitialiser les données</button>
      <button id="export-pdf">Exporter en PDF</button>
    </div>
  </header>

  <div class="container">
    <div class="add">
      <input id="taskInput" placeholder="Nouvelle étape de ton plan d’action…">
      <button id="addBtn">Ajouter</button>
    </div>

    <div id="export-zone">

      <div class="board">
        <div class="column" data-status="todo">
          <h2>À faire <span id="count-todo"></span></h2>
          <div class="tasks" id="todo"></div>
        </div>

        <div class="column" data-status="doing">
          <h2>En cours <span id="count-doing"></span></h2>
          <div class="tasks" id="doing"></div>
        </div>

        <div class="column" data-status="done">
          <h2>Terminé <span id="count-done"></span></h2>
          <div class="tasks" id="done"></div>
        </div>
      </div>

      <p class="hint">
        Astuce : garde ce plan d’action pour un seul objectif important, et avance étape par étape.
      </p>

    </div>
  </div>
</div>

<script>
// Chargement des tâches
let tasks = JSON.parse(localStorage.getItem("planAction")) || [];

function save() {
  localStorage.setItem("planAction", JSON.stringify(tasks));
}

function render() {
  const statuses = ["todo", "doing", "done"];
  const counts = { todo: 0, doing: 0, done: 0 };

  statuses.forEach(status => {
    const container = document.getElementById(status);
    container.innerHTML = "";

    tasks
      .filter(t => t.status === status)
      .forEach(t => {
        counts[status]++;

        const div = document.createElement("div");
        div.className = "task " + status;
        div.textContent = t.title;

        div.onclick = () => moveTask(t.id);

        const info = document.createElement("small");
        info.textContent =
          status === "todo" ? "→ En cours" :
          status === "doing" ? "→ Terminé" :
          "→ Revenir à À faire";

        div.appendChild(info);
        container.appendChild(div);
      });
  });

  document.getElementById("count-todo").textContent = counts.todo ? `(${counts.todo})` : "";
  document.getElementById("count-doing").textContent = counts.doing ? `(${counts.doing})` : "";
  document.getElementById("count-done").textContent = counts.done ? `(${counts.done})` : "";
}

function addTask() {
  const input = document.getElementById("taskInput");
  const title = input.value.trim();
  if (!title) return;

  tasks.push({ id: Date.now(), title, status: "todo" });
  input.value = "";
  save();
  render();
}

function moveTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;

  const cycle = { todo: "doing", doing: "done", done: "todo" };
  t.status = cycle[t.status];

  save();
  render();
}

document.getElementById("addBtn").onclick = addTask;
document.getElementById("taskInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

render();

// RESET
document.getElementById("reset-data").addEventListener("click", () => {
  if (confirm("Voulez-vous vraiment tout réinitialiser ?")) {
    localStorage.removeItem("planAction");
    location.reload();
  }
});

// PDF
document.getElementById("export-pdf").addEventListener("click", generatePDF);

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.setFontSize(18);
  doc.text("Plan d’action", 10, y);
  y += 12;

  function block(title, items) {
    doc.setFontSize(14);
    doc.setTextColor(37, 99, 235);
    doc.text(title, 10, y);
    y += 4;

    doc.setDrawColor(180, 180, 180);
    doc.setLineWidth(0.3);
    doc.line(10, y, 200, y);
    y += 6;

    const rows = items.length ? items.map(t => [t]) : [["(Aucune tâche)"]];

    doc.autoTable({
      startY: y,
      head: [["Tâches"]],
      body: rows,
      styles: {
        fontSize: 11,
        cellPadding: 2,
        lineWidth: 0.2,
        lineColor: [16, 185, 129],
        fillColor: [255, 255, 255]
      },
      headStyles: {
        fillColor: [120, 120, 120],
        textColor: [255, 255, 255],
        halign: "center"
      },
      bodyStyles: {
        halign: "left"
      }
    });

    y = doc.lastAutoTable.finalY + 10;
  }

  const todo = tasks.filter(t => t.status === "todo").map(t => t.title);
  const doing = tasks.filter(t => t.status === "doing").map(t => t.title);
  const done = tasks.filter(t => t.status === "done").map(t => t.title);

  block("À faire", todo);
  block("En cours", doing);
  block("Terminé", done);

  doc.save("plan_action.pdf");
}
</script>

</body>
</html>
